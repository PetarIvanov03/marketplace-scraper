<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicycle Listings</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <div class="header__inner">
            <h1 class="header__title">Bicycle Listings</h1>
            <button id="scrape-btn" class="btn btn--primary">Scrape Now</button>
        </div>
        <div id="scrape-status" class="scrape-status">Loading status...</div>
    </header>

    <main class="main">
        <div class="filters">
            <label class="filter-item">
                <span>Source</span>
                <select id="filter-source">
                    <option value="">All</option>
                    <option value="olx">OLX</option>
                    <option value="bazar">Bazar</option>
                </select>
            </label>
            <label class="filter-item filter-item--checkbox">
                <input type="checkbox" id="filter-new">
                <span>Only new</span>
            </label>
            <label class="filter-item">
                <span>Published</span>
                <select id="filter-hours">
                    <option value="">All time</option>
                    <option value="1">Last 1h</option>
                    <option value="6">Last 6h</option>
                    <option value="24">Last 24h</option>
                    <option value="48">Last 48h</option>
                </select>
            </label>
            <span id="listing-count" class="listing-count"></span>
        </div>

        <div id="listings-grid" class="listings-grid">
            <div class="loading">Loading listings...</div>
        </div>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
